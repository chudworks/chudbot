# Chudbot 2.0 configuration.
#
# Copy this file to config.toml and replace placeholder secrets. The runtime
# reads only this TOML file plus CLI flags; it does not read environment
# variables for bot, provider, database, or web settings.
#
# Validate without opening Discord or the web listener:
#
#   cargo run -p chudbot-bin -- check-config --config config.toml

[database]
# Standard libpq/Postgres connection URL.
url = "postgres://chud@localhost/chudbot"

[logging]
# Tracing filter expression. Useful examples:
#   "info"
#   "info,chudbot=debug"
# `chudbot=debug` matches every first-party crate target, including
# `chudbot_bot`, `chudbot_web`, and provider crates such as `chudbot_xai`.
filter = "info,chudbot=debug"
# One of: "pretty", "compact", "json".
format = "pretty"
# Disable ANSI when logs are written to a file or systemd journal.
ansi = true

[web]
# Socket address for the Axum web/API server.
listen = "127.0.0.1:1860"
# Browser tab title prefix used by the React trace viewer.
title_prefix = "Chudbot - "
# Directory containing the built Vite bundle. `serve.sh deploy` should copy
# frontend/dist here atomically.
frontend_dir = "frontend-build"
# Optional favicon. Keep it outside frontend_dir because deploys replace that
# directory. Uncomment after setting a real path.
# favicon_path = "/Users/chud/Documents/chudbot/chudbot.ico"

[storage]
# Local media directories. The database stores stable URIs such as
# file://images/<name>, file://videos/<name>, file://audio/<name>, and
# file://avatars/<name>.
images_dir = "images"
videos_dir = "videos"
audio_dir = "audio"
avatars_dir = "avatars"
# Public URL used when providers need to fetch stored media server-side. If this
# is omitted, the runtime falls back to [bot].web_base_url.
public_base_url = "http://localhost:1860"

[memory]
# Global memory switch. Per-agent `memory = true` below opts an agent into
# memory tools when this is enabled. Memory profiles are returned by the lookup
# tool, not injected into ordinary turn context.
enabled = true
# LLM provider registry key used by background diary/compaction jobs.
provider = "grok"
poll_interval_seconds = 60
# Pending memory events and diary entries are rolled into the compact profile only
# when the user's last compaction is at least this old and no diary job/window is
# due or inflight. Users with no pending changes do not get compact jobs.
compaction_interval = "24h"
# Only completed turns newer than this are considered when creating diary
# backfill jobs, so enabling memory on an old database does not summarize full
# history.
diary_backfill_window = "3d"
# Each diary job summarizes one completed source window of this size. After the
# first diary entry, non-empty windows stay anchored to the previous window end;
# source-empty intervals are skipped.
diary_interval = "24h"
lease_seconds = 300
max_jobs_per_tick = 4
max_concurrent_jobs = 4
max_transcript_turns_per_diary_job = 40
max_diary_output_tokens = 1024
max_profile_output_tokens = 2048
retry_backoff_seconds = 300
max_job_attempts = 5

[bot]
# Public trace-viewer URL posted in the first Discord reply for a conversation.
web_base_url = "http://localhost:1860"
# Fallback agent when no platform/DB scoped selection applies.
default_agent = "default"
# Operator users allowed to pause/resume a conversation with 🛑 on any
# Chudbot-tracked message. Omit guild_id to allow the user across the platform.
admins = [
  { platform = "discord", user_id = "123456789012345678" }
]
# Optional deployment-wide policy prepended before each agent's own prompt.
extra_system_prompt = """
This bot runs in a private Discord server. Follow Discord platform policy and
do not reveal internal ids, file:// URIs, or implementation details unless the
operator explicitly asks for them.
"""
# Usually left empty; chudbot-bin fills this from its package version.
version = ""
# Default agent loop limit. Individual agents can override it.
limits = { max_iterations = 8 }
# New conversations ask the platform to open a thread once the answer exceeds
# either threshold. Visible lines count literal newlines plus approximate
# Discord soft-wrap rows.
thread_threshold_chars = 1500
thread_threshold_lines = 20

[bot.platforms.discord]
# Default agent for this message platform. Platform bindings are optional; when
# absent, [bot].default_agent is used.
agent = "default"

[default_privacy]
# Deployment fallback before a server stores an override through /chudbot-mode.
# Variants:
#   mode = "open"; history_size = 20
#   mode = "channel_only"; channel = { platform = "discord", guild_id = "123", channel_id = "456" }; history_size = 20
#   mode = "opt_in"
#   mode = "conversation_only"
mode = "opt_in"

[platforms.discord]
kind = "discord"
token = "DISCORD_BOT_TOKEN"
# Optional Discord guild id for development command registration. Use a string
# to keep snowflakes lossless.
dev_guild_id = "123456789012345678"

# Named language-model provider services. Agent configs reference these names
# through `provider = "<name>"`. Provider instances are model-agnostic; model
# ids live on agents.

[llm.grok]
kind = "xai"
api_key = "xai-..."
# base_url = "https://api.x.ai/v1"

[llm.openai]
kind = "openai"
api_key = "sk-..."
# base_url = "https://api.openai.com/v1"

[llm.anthropic]
kind = "anthropic"
api_key = "sk-ant-..."
# base_url = "https://api.anthropic.com/v1"

# OpenAI-compatible Chat Completions provider for local/model-gateway hosts.
# vLLM defaults to http://127.0.0.1:8000/v1 and needs
# `--enable-auto-tool-choice --tool-call-parser <parser>` for automatic client
# tool calls.
[llm.local_compat]
kind = "openai_compat"
base_url = "http://127.0.0.1:8000/v1"
api_key = "EMPTY"

# Named image-generation services.

[image.grok_images]
kind = "xai"
api_key = "xai-..."
# base_url = "https://api.x.ai/v1"

[image.openai_images]
kind = "openai"
api_key = "sk-..."
# base_url = "https://api.openai.com/v1"

# Named video-generation services. xAI is the only implemented v2 video backend.

[video.grok_video]
kind = "xai"
api_key = "xai-..."
# base_url = "https://api.x.ai/v1"

# Named audio transcription services. xAI uses the Grok Speech-to-Text endpoint.

[audio.grok_audio]
kind = "xai"
api_key = "xai-..."
# base_url = "https://api.x.ai/v1"

# Agents are prompt + provider + model + tool exposure. The name after
# [bot.agents.<name>] is the runtime selection key used by /chudbot-agent.

[bot.agents.default]
provider = "grok"
system_prompt = """
You are Chudbot, a direct and useful assistant in a private Discord server.
Answer naturally for Discord. Use available search and fetch tools when they
would materially improve the answer.
"""
# Optional agent-level allowlists. Omit for the full runtime-provided surface.
# server_tools = ["web_search", "x_search"]
# client_tools = ["fetch_messages", "generate_image", "generate_video", "transcribe_audio", "post_status_message", "lookup_user_memory", "remember_user_memory", "forget_user_memory"]
memory = true
limits = { max_iterations = 8 }

[bot.agents.default.model]
id = "grok-4.3"
# Provider-side tools allowed by this model config. The agent-level
# `server_tools` field can further restrict this set.
server_tools = ["web_search", "x_search"]

[bot.agents.default.model.sampling]
max_output_tokens = 4096
temperature = 0.7
top_p = 0.95

[bot.agents.default.model.provider_options]
value = { reasoning_effort = "high" }

[bot.agents.default.image_generation]
provider = "grok_images"
# Provider-specific image model id or tier.
model = "quality"

[bot.agents.default.video_generation]
provider = "grok_video"
# Provider-specific video model id.
model = "grok-imagine-video"

[bot.agents.default.audio_transcription]
provider = "grok_audio"
# Optional spoken wake word for audio messages that are not already in a
# Chudbot thread/reply. This is also sent as an xAI STT keyterm bias. Omit this
# to ignore standalone no-text audio.
wake_word = "Chudbot"

[bot.agents.research]
provider = "openai"
system_prompt = """
You are a careful research assistant. Ground claims with current search when
available, separate facts from judgment, and keep the final answer concise.
"""
server_tools = ["web_search"]
client_tools = ["fetch_messages", "post_status_message"]

[bot.agents.research.model]
id = "gpt-5.5"
server_tools = ["web_search"]

[bot.agents.research.model.sampling]
max_output_tokens = 4096

[bot.agents.research.model.provider_options]
value = { reasoning_effort = "medium" }

[bot.agents.research.image_generation]
provider = "openai_images"
model = "gpt-image-1"

[bot.agents.claude]
provider = "anthropic"
system_prompt = """
You are a concise assistant. Prefer clear, factual answers and ask for missing
context only when it is necessary.
"""
server_tools = ["web_search"]
client_tools = ["fetch_messages", "post_status_message"]
limits = { max_iterations = 6 }

[bot.agents.claude.model]
id = "claude-sonnet-4-6"
server_tools = ["web_search"]

[bot.agents.claude.model.sampling]
max_output_tokens = 4096
temperature = 0.4

# Subagents expose another configured agent as a client-side tool to the parent
# model. The target agent must exist in [bot.agents].
[bot.agents.default.subagents.research_helper]
agent = "research"
description = "Ask a focused research subagent to gather facts and return a concise summary."

