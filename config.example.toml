# Chudbot configuration.
#
# Copy this file to config.toml and replace placeholder secrets. The runtime
# reads only this TOML file plus CLI flags; it does not read environment
# variables for bot, provider, database, or web settings. The S3 storage
# backend is the exception: when enabled, AWS SDK credentials and region can be
# loaded from the normal AWS environment/profile chain.
#
# Validate without opening Discord or the web listener:
#
#   cargo run -p chudbot-bin -- check-config --config config.toml

[database]
# Standard libpq/Postgres connection URL.
url = "postgres://chud@localhost/chudbot"

[logging]
# Tracing filter expression. Useful examples:
#   "info"
#   "info,chudbot=debug"
# `chudbot=debug` matches every first-party crate target, including
# `chudbot_bot`, `chudbot_web`, and provider crates such as `chudbot_xai`.
filter = "info,chudbot=debug"
# One of: "pretty", "compact", "json".
format = "pretty"
# Disable ANSI when logs are written to a file or systemd journal.
ansi = true

[web]
# Socket address for the Axum web/API server.
listen = "127.0.0.1:1860"
# Browser tab title prefix used by the React trace viewer.
title_prefix = "Chudbot - "
# Directory containing the built Vite bundle. `serve.sh deploy` should copy
# frontend/dist here atomically.
frontend_dir = "frontend-build"
# Optional favicon. Keep it outside frontend_dir because deploys replace that
# directory. Uncomment after setting a real path.
# favicon_path = "/Users/chud/Documents/chudbot/chudbot.ico"
# Public origin used for the absolute URLs in link-preview (OpenGraph) tags on
# /c/<id> pages, which give pasted trace links a proper embed in Discord.
# Falls back to [bot].web_base_url when omitted.
# public_base_url = "https://chudbot.example.com"
# Optional square icon (png/jpg/webp) shown as the link-preview thumbnail,
# served at /og-image. Keep it outside frontend_dir like the favicon.
# og_image_path = "/Users/chud/Documents/chudbot/chudbot.png"
# Whether access logs trust Cloudflare/proxy headers for client IPs. Defaults
# to true, which matches the Cloudflare tunnel deploy. Set false for direct
# public exposure without a trusted proxy in front.
# trust_forwarded_for = true

[storage]
# Local media directories. The database stores stable URIs such as
# media://images/<name>, media://videos/<name>, media://audio/<name>,
# media://avatars/<name>, and media://guild-icons/<name>.
kind = "local"
images_dir = "images"
videos_dir = "videos"
audio_dir = "audio"
avatars_dir = "avatars"
guild_icons_dir = "guild-icons"
# Public URL used when providers need to fetch stored media server-side. If this
# is omitted, the runtime falls back to [bot].web_base_url.
public_base_url = "http://localhost:1860"

# S3-compatible media storage. The stored URIs still use the same
# media://images/<name> shape; only the configured backend changes where bytes
# are persisted and loaded. Credentials are loaded by the AWS SDK, so set
# AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY, AWS_PROFILE, IAM role credentials, or
# another standard AWS provider before running Chudbot.
#
# [storage]
# kind = "s3"
# bucket = "assets.chudbot.example.com"
# region = "us-east-1"
# Optional endpoint override for S3-compatible APIs such as MinIO, R2, or
# LocalStack.
# endpoint_url = "https://s3.us-east-1.amazonaws.com"
# force_path_style = false
# Public URL base for bucket-hosted assets. With the object key
# images/abc.png, Chudbot reports https://assets.chudbot.example.com/images/abc.png.
# If omitted, the runtime falls back to [bot].web_base_url and serves media
# through the web routes.
# public_base_url = "https://assets.chudbot.example.com"

[memory]
# Global memory switch. Per-agent `memory = true` below opts an agent into
# memory tools when this is enabled. Memory profiles are returned by the lookup
# tool, not injected into ordinary turn context.
enabled = true
# Background memory workers use the normal [bot.agents.memory_diary] and
# [bot.agents.memory_compact] configs below. If either is omitted, the runtime
# synthesizes the built-in default for that missing agent.
poll_interval_seconds = 60
# Pending memory events and diary entries are rolled into the compact profile only
# when the user's last compaction is at least this old and no diary job/window is
# due or inflight. Users with no pending changes do not get compact jobs.
compaction_interval = "24h"
# Only completed turns newer than this are considered when creating diary
# backfill jobs, so enabling memory on an old database does not summarize full
# history.
diary_backfill_window = "3d"
# Each diary job summarizes one completed source window of this size. After the
# first diary entry, non-empty windows stay anchored to the previous window end;
# source-empty intervals are skipped.
diary_interval = "24h"
lease_seconds = 300
max_jobs_per_tick = 4
max_concurrent_jobs = 4
max_transcript_turns_per_diary_job = 40
retry_backoff_seconds = 300
# When a diary job exhausts this limit, that source window is skipped by future
# scheduling so one bad window cannot be retried forever.
max_job_attempts = 5

[bot]
# Public trace-viewer URL posted in the first Discord reply for a conversation.
web_base_url = "http://localhost:1860"
# Fallback agent when no platform/DB scoped selection applies.
default_agent = "default"
# Operator users allowed to pause/resume a conversation with 🛑 on any
# Chudbot-tracked message. Omit guild_id to allow the user across the platform.
admins = [
  { platform = "discord", user_id = "123456789012345678" }
]
# Optional deployment-wide policy prepended before each agent's own prompt.
extra_system_prompt = """
This bot runs in a private Discord server. Follow Discord platform policy and
do not reveal internal ids, media:// URIs, or implementation details unless the
operator explicitly asks for them.
"""
# Usually left empty; chudbot-bin fills this from its package version.
version = ""
# Default agent loop limit. Individual agents can override it.
limits = { max_iterations = 8 }
# New conversations ask the platform to open a thread once the answer exceeds
# either threshold. Visible lines count literal newlines plus approximate
# Discord soft-wrap rows.
thread_threshold_chars = 1500
thread_threshold_lines = 20

[bot.platforms.discord]
# Default agent for this message platform. Platform bindings are optional; when
# absent, [bot].default_agent is used.
agent = "default"

[platforms.discord]
kind = "discord"
token = "DISCORD_BOT_TOKEN"
# Slash commands register globally on startup so every guild that installed the
# app can use them.

# Named language-model provider services. Agent configs reference these names
# through `provider = "<name>"`. Provider instances are model-agnostic; model
# ids live on agents.

[llm.grok]
kind = "xai"
api_key = "xai-..."
# base_url = "https://api.x.ai/v1"
# Optional exact local JSON dumps for debugging xAI Responses caching. Files are
# grouped by Chudbot conversation id, for example
# dumps/<conversation-id>/0001_request.json and 0001_response.json.
# dump_dir = "dumps"

[llm.openai]
kind = "openai"
api_key = "sk-..."
# base_url = "https://api.openai.com/v1"
# Optional cost-estimation overrides. Values are USD per 1M tokens. Built-in
# defaults cover common standard-tier OpenAI models, but you can pin/update
# rates here when pricing, service tier, long-context, or regional rates differ.
[llm.openai.pricing."gpt-5.5"]
input_usd_per_million_tokens = 5.00
cached_input_usd_per_million_tokens = 0.50
output_usd_per_million_tokens = 30.00

[llm.anthropic]
kind = "anthropic"
api_key = "sk-ant-..."
# base_url = "https://api.anthropic.com/v1"
# Optional cost-estimation overrides. Values are USD per 1M tokens. Built-in
# defaults cover standard/global Claude API pricing for current Claude models.
# Cache rates default to Anthropic's documented multipliers when omitted:
# 5m writes = 1.25x input, 1h writes = 2x input, reads = 0.1x input.
[llm.anthropic.pricing."claude-sonnet-4-6"]
input_usd_per_million_tokens = 3.00
# cache_creation_5m_usd_per_million_tokens = 3.75
# cache_creation_1h_usd_per_million_tokens = 6.00
# cache_read_usd_per_million_tokens = 0.30
output_usd_per_million_tokens = 15.00
# Anthropic exposes context limits through its Models API, so model_info is
# usually unnecessary here. You can still use it to patch or override metadata.
# [llm.anthropic.model_info."claude-sonnet-4-6"]
# context_window_tokens = 1000000
# max_output_tokens = 64000

[llm.gemini]
kind = "gemini"
api_key = "AIza..."
# base_url = "https://generativelanguage.googleapis.com/v1beta"

# OpenAI-compatible Chat Completions provider for local/model-gateway hosts.
# vLLM defaults to http://127.0.0.1:8000/v1 and needs
# `--enable-auto-tool-choice --tool-call-parser <parser>` for automatic client
# tool calls.
[llm.local_compat]
kind = "openai_compat"
base_url = "http://127.0.0.1:8000/v1"
api_key = "EMPTY"
# Useful when your OpenAI-compatible /models endpoint omits context limits, or
# when it reports implementation ids that do not match the configured agent
# model id.
[llm.local_compat.model_info."Qwen/Qwen3-32B"]
context_window_tokens = 32768
# max_output_tokens = 8192

# Named image-generation services.

[image.grok_images]
kind = "xai"
api_key = "xai-..."
# base_url = "https://api.x.ai/v1"

[image.openai_images]
kind = "openai"
api_key = "sk-..."
# base_url = "https://api.openai.com/v1"
# Optional image-token cost-estimation overrides. GPT image usage reports
# separate text/image token details when available.
[image.openai_images.pricing."gpt-image-1"]
text_input_usd_per_million_tokens = 5.00
image_input_usd_per_million_tokens = 10.00
image_output_usd_per_million_tokens = 40.00

[image.gemini_images]
kind = "gemini"
api_key = "AIza..."
# base_url = "https://generativelanguage.googleapis.com/v1beta"

# Named video-generation services.

[video.grok_video]
kind = "xai"
api_key = "xai-..."
# base_url = "https://api.x.ai/v1"

[video.gemini_video]
kind = "gemini"
api_key = "AIza..."
# base_url = "https://generativelanguage.googleapis.com/v1beta"

# Named audio transcription services. xAI uses the Grok Speech-to-Text endpoint.

[audio.grok_audio]
kind = "xai"
api_key = "xai-..."
# base_url = "https://api.x.ai/v1"

# Agents are prompt + provider + model + tool exposure. User-facing agents can
# be selected with /chudbot-agent. The reserved system agent names
# memory_diary, memory_compact, tos_preflight, and conversation_title are picked
# up by internal jobs and are hidden from /chudbot-agent selection.

[bot.agents.default]
provider = "grok"
system_prompt = """
You are Chudbot, a direct and useful assistant in a private Discord server.
Answer naturally for Discord. Use available search and fetch tools when they
would materially improve the answer.
"""
# Optional agent-level allowlists. Omit for the full runtime-provided surface.
# server_tools = ["web_search", "x_search"]
# client_tools = ["fetch_messages", "generate_image", "generate_video", "transcribe_audio", "read", "stat", "public_url", "attach", "post_status_message", "add_reaction", "usage_report", "lookup_user_memory", "remember_user_memory", "forget_user_memory"]
memory = true
limits = { max_iterations = 8 }

[bot.agents.default.model]
id = "grok-4.3"
# Provider-side tools allowed by this model config. The agent-level
# `server_tools` field can further restrict this set.
server_tools = ["web_search", "x_search"]

[bot.agents.default.model.sampling]
max_output_tokens = 4096
temperature = 0.7
top_p = 0.95

[bot.agents.default.model.provider_options]
value = { reasoning_effort = "high" }

[bot.agents.default.image_generation]
provider = "grok_images"
# Provider-specific image model id or tier.
model = "quality"

[bot.agents.default.video_generation]
provider = "grok_video"
# Provider-specific video model id.
model = "grok-imagine-video"

# Optional active-generation rate limit for non-bypassed platform scopes.
# Counts pending video_jobs and saved done video_jobs inside the rolling interval.
# [bot.agents.default.video_generation.rate_limit]
# limit = 2
# interval = "4h"
# bypass_scopes = [{ platform = "discord", scope_id = "123456789012345678" }]

[bot.agents.default.audio_transcription]
provider = "grok_audio"
# Optional spoken wake word for audio messages that are not already in a
# Chudbot thread/reply. This is also sent as an xAI STT keyterm bias. Omit this
# to ignore standalone no-text audio.
wake_word = "Chudbot"

[bot.agents.memory_diary]
provider = "grok"
system_prompt = """
You write concise user-memory diary entries for Chudbot. Read the bounded transcript slice and optional current memory profile. Extract only stable, useful observations about the subject user. Include uncertainty when evidence is weak. Prefer factual bullets over prose. Consider relationships, preferences and dislikes, projects, work, hobbies, recurring topics, server lore, running jokes, good-natured roast material, corrections, stale facts, and visually meaningful image evidence. Do not invent facts.
"""
limits = { max_iterations = 8 }

[bot.agents.memory_diary.model]
id = "grok-4.3"

[bot.agents.memory_diary.model.sampling]
max_output_tokens = 1024
temperature = 0.2
top_p = 0.9

[bot.agents.memory_diary.model.provider_options]
value = { reasoning_effort = "high" }

[bot.agents.memory_compact]
provider = "grok"
system_prompt = """
You maintain a compact Markdown memory profile for one Chudbot user in one server/workspace. Produce a complete replacement profile, not a diff. Use explicit memory events, diary entries, corrections, and forget requests. Keep the profile short, normally 1-3 KB. Remove or rewrite forgotten and stale facts. Preserve useful uncertainty. Output Markdown only.
"""
limits = { max_iterations = 8 }

[bot.agents.memory_compact.model]
id = "grok-4.3"

[bot.agents.memory_compact.model.sampling]
max_output_tokens = 2048
temperature = 0.2
top_p = 0.9

[bot.agents.memory_compact.model.provider_options]
value = { reasoning_effort = "high" }

[bot.agents.tos_preflight]
provider = "grok"
system_prompt = """
You are a TOS compliance classifier for a private friends-only Discord server. Each message you classify is prefixed with the sender's display name as `[name]: `. The DEFAULT IS ALLOW. Only REFUSE the narrowly listed categories below.

REFUSE these:
- CSAM or any sexualization of minors
- Doxxing: sharing someone's non-public personal info with apparent intent to harm
- Credible, specific threats of violence against a real, identifiable person
- Coordinated incitement to suicide or self-harm directed at a specific person
- Illegal arrangements: drug or weapon sales, human trafficking, exploitation rings
- Malware, phishing payloads, or coordinated large-scale spam campaigns

ALLOW EVERYTHING ELSE, including profanity, insults, dark humor, political opinions, criticism of public figures, news/current-events questions, and edgy art requests that do not involve minors.

When in any doubt, ALLOW.

Respond with EXACTLY one token: ALLOW or REFUSE. No punctuation. No explanation.
"""
limits = { max_iterations = 8 }

[bot.agents.tos_preflight.model]
id = "grok-4.3"

[bot.agents.tos_preflight.model.sampling]
max_output_tokens = 8
temperature = 0.0

[bot.agents.conversation_title]
provider = "grok"
system_prompt = """
You write very short conversation titles. Output ONLY a title for the conversation below: five words or fewer, no quotes, no period, no leading 'Re:' or 'Conversation about'. Just the title text.
"""
limits = { max_iterations = 8 }

[bot.agents.conversation_title.model]
id = "grok-4.3"

[bot.agents.conversation_title.model.sampling]
max_output_tokens = 96
temperature = 0.3

[bot.agents.conversation_title.model.provider_options]
value = { reasoning_effort = "high" }

[bot.agents.research]
provider = "openai"
system_prompt = """
You are a careful research assistant. Ground claims with current search when
available, separate facts from judgment, and keep the final answer concise.
"""
server_tools = ["web_search"]
client_tools = ["fetch_messages", "post_status_message", "add_reaction", "usage_report"]

[bot.agents.research.model]
id = "gpt-5.5"
server_tools = ["web_search"]

[bot.agents.research.model.sampling]
max_output_tokens = 4096

[bot.agents.research.model.provider_options]
value = { reasoning_effort = "medium", reasoning_summary = "auto", text_verbosity = "low" }

[bot.agents.research.image_generation]
provider = "openai_images"
model = "gpt-image-1"

[bot.agents.claude]
provider = "anthropic"
system_prompt = """
You are a concise assistant. Prefer clear, factual answers and ask for missing
context only when it is necessary.
"""
server_tools = ["web_search"]
client_tools = ["fetch_messages", "post_status_message", "add_reaction", "usage_report"]
limits = { max_iterations = 6 }

[bot.agents.claude.model]
id = "claude-sonnet-4-6"
server_tools = ["web_search"]

[bot.agents.claude.model.sampling]
max_output_tokens = 4096
temperature = 0.4
# [bot.agents.claude.model.provider_options]
# value = { effort = "medium", thinking = { type = "adaptive", display = "summarized" } }

# Subagents expose another configured agent as a client-side tool to the parent
# model. The target agent must exist in [bot.agents]. Subagent runs share the
# conversation context, but generated-media delivery, explicit attachment, and
# memory writes stay with the top-level agent.
[bot.agents.default.subagents.research_helper]
agent = "research"
description = "Ask a focused research subagent to gather facts and return a concise summary."

